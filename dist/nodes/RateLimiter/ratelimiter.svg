<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <!-- Clock face -->
  <circle cx="30" cy="30" r="26" fill="#FF6D5A" opacity="0.15" stroke="#FF6D5A" stroke-width="2.5"/>
  <!-- Speed gauge arc -->
  <path d="M 10 38 A 22 22 0 0 1 50 38" stroke="#FF6D5A" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Gauge ticks -->
  <line x1="10" y1="38" x2="13" y2="35" stroke="#FF6D5A" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="19" x2="21" y2="22" stroke="#FF6D5A" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="15" x2="30" y2="19" stroke="#FF6D5A" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="19" x2="39" y2="22" stroke="#FF6D5A" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="38" x2="47" y2="35" stroke="#FF6D5A" stroke-width="2" stroke-linecap="round"/>
  <!-- Needle pointing to ~40% -->
  <line x1="30" y1="30" x2="18" y2="22" stroke="#FF6D5A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="30" cy="30" r="3" fill="#FF6D5A"/>
  <!-- Speed limit badge -->
  <rect x="22" y="38" width="16" height="13" rx="2" fill="#FF6D5A"/>
  <text x="30" y="48.5" font-family="Arial" font-size="7" font-weight="bold" fill="white" text-anchor="middle">MAX</text>
</svg>
